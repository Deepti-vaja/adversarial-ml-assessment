seed: 42

model:
  in_channels: 3
  num_classes: 3
  dropout_conv: 0.3
  dropout_fc: 0.5

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "AdamW"
  checkpoint_dir: "./models/checkpoints"
  checkpoint_name: "fraud_cnn_baseline.pth"

data:
  dataset_dir: "./data/cifar10"
  val_ratio: 0.1
  batch_size: 64
  num_workers: 0
  pin_memory: true
  augmentation:
    random_crop:
      size: 32
      padding: 4
    random_horizontal_flip:
      p: 0.5
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
